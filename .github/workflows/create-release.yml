name: Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      matrix:
        include:
          - os: windows-latest
            requirements_tf: requirements_tf.txt
            architecture: windows-x64
          - os: macos-latest
            requirements_tf: requirements_tf_mac.txt
            architecture: macos-arm64

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Write release version
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Extract InstallForge (Windows)
      if: startsWith(matrix.os, 'windows-')
      run: |
        unzip ./app/tools/InstallForge.zip -d ./app/tools

    - name: Import certificate (macOS)
      if: startsWith(matrix.os, 'macos-')
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      run: |
        echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
        
        # create a temporary keychain
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        
        # import the certificate to the keychain and allow codesign to access it without prompting for password
        security import certificate.p12 -k build.keychain -P $MACOS_CERTIFICATE_PWD -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
        
        # verify the certificate was imported correctly
        security find-identity -v -p codesigning build.keychain
        
        echo "MACOS_CERTIFICATE_ID=${{ secrets.MACOS_CERTIFICATE_ID }}" >> "$GITHUB_ENV"

    - name: Store notarytool credentials (macOS)
      if: startsWith(matrix.os, 'macos-')
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        xcrun notarytool store-credentials "notary-profile" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID"
        
        echo "NOTARY_PROFILE=notary-profile" >> "$GITHUB_ENV"

    - name: Install create-dmg (macOS)
      if: startsWith(matrix.os, 'macos-')
      run: |
        brew install create-dmg

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ..
        pip install -r requirements.txt
        pip install -r ${{ matrix.requirements_tf }}
        pip install pyinstaller
      working-directory: ./app

    - name: Set correct version numbers
      run: |
        python replace_version.py "${VERSION}" "${{ matrix.architecture }}"
      working-directory: ./app

    - name: Build executable with PyInstaller
      run: |
        pyinstaller app.spec --noconfirm
      working-directory: ./app

    - name: Upload unsigned application (Windows)
      if: startsWith(matrix.os, 'windows-')
      id: upload-unsigned-application
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.architecture }}-unsigned
        path: |
          ./app/dist/sirkku/sirkku.exe
          ./app/dist/sirkku/sirkkuAnalyze.exe

    - name: Sign application with SignPath (Windows)
      if: startsWith(matrix.os, 'windows-')
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
        project-slug: 'bird-identification'
        signing-policy-slug: 'test-signing'
        artifact-configuration-slug: 'Sirkku_application'
        github-artifact-id: '${{ steps.upload-unsigned-application.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: './app/dist/signed'

    - name: Copy signed executables (Windows)
      if: startsWith(matrix.os, 'windows-')
      run: |
        cp ./app/dist/signed/sirkku.exe ./app/dist/signed/sirkkuAnalyze.exe ./app/dist/sirkku/

    - name: Build installer with InstallForge (Windows)
      if: startsWith(matrix.os, 'windows-')
      run: |
        ./ifbuildx86.exe -i ../../../app.ifp
      working-directory: ./app/tools/InstallForge/bin

    - name: Rename unsigned installer (Windows)
      if: startsWith(matrix.os, 'windows-')
      run: |
        mv ./app/dist/sirkku-${VERSION}-${{ matrix.architecture }}-setup.exe ./app/dist/sirkku-setup-unsigned.exe

    - name: Upload unsigned installer (Windows)
      if: startsWith(matrix.os, 'windows-')
      id: upload-unsigned-installer
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.architecture }}-installer-unsigned
        path: ./app/dist/sirkku-setup-unsigned.exe

    - name: Sign installer with SignPath (Windows)
      if: startsWith(matrix.os, 'windows-')
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
        project-slug: 'bird-identification'
        signing-policy-slug: 'test-signing'
        artifact-configuration-slug: 'Sirkku_installer'
        github-artifact-id: '${{ steps.upload-unsigned-installer.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: './app/dist/signed'

    - name: Rename signed installer (Windows)
      if: startsWith(matrix.os, 'windows-')
      run: |
        mv ./app/dist/signed/sirkku-setup-unsigned.exe ./app/dist/sirkku-${VERSION}-${{ matrix.architecture }}-setup.exe

    - name: Build Disk Image with create-dmg (macOS)
      if: startsWith(matrix.os, 'macos-')
      run: |
        ./build_dmg.sh
      working-directory: ./app

    - name: Upload installer (Windows)
      if: startsWith(matrix.os, 'windows-')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.architecture }}-installer
        path: ./app/dist/sirkku-*-setup.exe

    - name: Upload installer (macOS)
      if: startsWith(matrix.os, 'macos-')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.architecture }}-installer
        path: ./app/dist/sirkku-*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Determine if pre-release
      run: |
        if [[ "$GITHUB_REF_NAME" =~ -[a-zA-Z] ]]; then
          echo "PRERELEASE=true" >> "$GITHUB_ENV"
        else
          echo "PRERELEASE=false" >> "$GITHUB_ENV"
        fi

    - name: Download Windows installer
      uses: actions/download-artifact@v8
      with:
        name: windows-x64-installer
        path: ./artifacts

    - name: Download macOS installer
      uses: actions/download-artifact@v8
      with:
        name: macos-arm64-installer
        path: ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        prerelease: ${{ env.PRERELEASE == 'true' }}
        files: ./artifacts/*
