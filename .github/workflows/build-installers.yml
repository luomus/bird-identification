name: Build Installers

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            requirements_tf: requirements_tf.txt
            architecture: windows-x64
          - os: macos-latest
            requirements_tf: requirements_tf_mac.txt
            architecture: macos-arm64

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Write release version
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Extract InstallForge (Windows)
      if: startsWith(matrix.os, 'windows-')
      run: |
        Expand-Archive -Path app\tools\InstallForge.zip -DestinationPath app\tools

    - name: Import MacOS certificate
      if: startsWith(matrix.os, 'macos-')
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      run: |
        echo $MACOS_CERTIFICATE | base64 —decode > certificate.p12
        
        # create a temporary keychain
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        
        # import the certificate to the keychain and allow codesign to access it without prompting for password
        security import certificate.p12 -k build.keychain -P $MACOS_CERTIFICATE_PWD -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
        
        # verify the certificate was imported correctly
        security find-identity -v -p codesigning build.keychain
        
        echo "MACOS_CERTIFICATE_ID=${{ secrets.MACOS_CERTIFICATE_ID }}" >> "$GITHUB_ENV"

    - name: Install create-dmg (macOS)
      if: startsWith(matrix.os, 'macos-')
      run: |
        brew install create-dmg

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ..
        pip install -r requirements.txt
        pip install -r ${{ matrix.requirements_tf }}
        pip install pyinstaller
      working-directory: ./app

    - name: Set correct version numbers
      shell: bash
      run: |
        python replace_version.py "${VERSION}" "${{ matrix.architecture }}"
      working-directory: ./app

    - name: Build executable with PyInstaller
      run: |
        pyinstaller app.spec --noconfirm
      working-directory: ./app

    - name: Build Windows installer with InstallForge
      if: startsWith(matrix.os, 'windows-')
      run: |
        .\ifbuildx86.exe -i ..\..\..\app.ifp
      working-directory: ./app/tools/InstallForge/bin

    - name: Build macOS Disk Image with create-dmg
      if: startsWith(matrix.os, 'macos-')
      run: |
        ./build_dmg.sh
      working-directory: ./app

    - name: Upload installer (Windows)
      if: startsWith(matrix.os, 'windows-')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.architecture }}-installer
        path: .\app\dist\sirkku-*-setup.exe

    - name: Upload installer (macOS)
      if: startsWith(matrix.os, 'macos-')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.architecture }}-installer
        path: ./app/dist/sirkku-*.dmg
