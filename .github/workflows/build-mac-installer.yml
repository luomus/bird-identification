name: Build Mac Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Get data from private repo
      uses: actions/checkout@v6
      with:
        repository: luomus/bird-identification-app-data
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        path: private-data

    - name: Move data to correct places
      run: |
        rm -rf app/models
        mv private-data/default-models app/models

    - name: Install create-dmg
      run: |
        brew install create-dmg

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ..
        pip install -r requirements.txt
        pip install -r requirements_tf_mac.txt
        pip install pyinstaller
      working-directory: ./app

    - name: Set correct version numbers
      run: |
        python replace_version.py
      working-directory: ./app

    - name: Build an app bundle with PyInstaller
      run: |
        pyinstaller app.spec --noconfirm
      working-directory: ./app

    - name: Build a Disk Image with create-dmg
      run: |
        ./build_dmg.sh
      working-directory: ./app

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: MacOS-Installer
        path: ./app/dist/birdIdentifier-*.dmg
