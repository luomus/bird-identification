services:
  api:
    container_name: bird-identification-api
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./api/api.py:/app/api/api.py
      - ./api/security.py:/app/api/security.py
      - ./api/settings.py:/app/api/settings.py
      - ./models:/app/models
      - ./api/config:/app/config
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    logging:
      options:
        max-size: 100m
        max-file: "3"

  cli:
    container_name: bird-identification-cli
    build:
      context: .
      dockerfile: cli/Dockerfile
    volumes:
      - ./shared:/app/shared
      - ./cli:/app/cli
      - ./models:/app/models
      - ./input:/app/input
      # ← Bind-mount the Windows folder directly (WSL path syntax):
      - /mnt/c/Users/mikko/Documents/Audiomoth_2025:/app/input/host:cached
    stdin_open: true
    tty: true

  test:
    container_name: test-bird-identification
    build:
      context: .
      dockerfile: cli/Dockerfile
    volumes:
      - ./shared:/app/shared
      - ./cli:/app/cli
    command: pytest /app/shared/tests /app/cli/tests -v
